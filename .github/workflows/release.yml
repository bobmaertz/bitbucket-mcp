name: Release

# Two-phase, manually-initiated release for @bobmaertz/bitbucket-mcp:
#   1. prepare (manual dispatch): bump the version on a branch, open a release PR.
#   2. publish (when that PR merges): tag the version and publish to npm with
#      OIDC Trusted Publishing + provenance.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Semver bump to apply'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
  pull_request:
    types: [closed]
    branches: [main]

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Phase 1 — bump the version on a release/* branch and open a PR. No publish.
  prepare:
    name: Prepare release PR
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write # push the release branch
      pull-requests: write # open the release PR

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'

      - name: Bump version and open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Bump the published server package, then keep every workspace + root
          # uniform at the same version (as the repo is today).
          npm version "${{ inputs.release_type }}" --no-git-tag-version \
            --workspace packages/bitbucket-mcp-server
          new_version="$(node -p "require('./packages/bitbucket-mcp-server/package.json').version")"
          npm version "$new_version" --no-git-tag-version \
            --workspace packages/bitbucket-api \
            --workspace packages/bitbucket-core
          npm version "$new_version" --no-git-tag-version --allow-same-version

          branch="release/v${new_version}"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          git add package.json package-lock.json packages/*/package.json
          git commit -m "chore(release): v${new_version}"

          n=0
          until git push -u origin "$branch"; do
            n=$((n + 1))
            if [ "$n" -ge 4 ]; then echo "branch push failed" >&2; exit 1; fi
            sleep $((2 ** n))
          done

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(release): v${new_version}" \
            --body "Automated release preparation for \`v${new_version}\`. Merging this PR tags the release and publishes \`@bobmaertz/bitbucket-mcp@${new_version}\` to npm."

  # Phase 2 — on merge of a release/* PR: re-run gates, tag, publish to npm.
  publish:
    name: Tag & publish
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest

    # Maintainer-only gate: the publish pauses until a required reviewer of the
    # "release" environment approves. Configure it once in GitHub:
    #   Settings -> Environments -> release
    #     - Required reviewers: the maintainers allowed to release
    #     - Deployment branches: "Selected" -> main
    environment: release

    permissions:
      contents: write # push the tag
      id-token: write # OIDC token for npm Trusted Publishing + provenance

    steps:
      - name: Checkout main (post-merge)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for OIDC Trusted Publishing
        # Node 20 ships an npm older than 11.5.1, which is required for OIDC
        # trusted publishing + automatic provenance.
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        run: npm ci

      # Publishing is irreversible — re-run the full quality gates before it.
      - name: Quality gates
        run: |
          npm run security:check
          npm run lint
          npm run format:check
          npm test
          npm run test:contract
          npm run build

      - name: Tag release
        id: tag
        run: |
          set -euo pipefail
          version="$(node -p "require('./packages/bitbucket-mcp-server/package.json').version")"
          tag="v${version}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists; skipping tag push."
          else
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git tag -a "${tag}" -m "Release ${tag}"
            n=0
            until git push origin "${tag}"; do
              n=$((n + 1))
              if [ "$n" -ge 4 ]; then echo "tag push failed" >&2; exit 1; fi
              sleep $((2 ** n))
            done
          fi

      - name: Publish to npm (provenance via OIDC)
        run: npm publish --provenance --access public --workspace packages/bitbucket-mcp-server

      - name: Summary
        if: always()
        run: |
          version="${{ steps.tag.outputs.version }}"
          {
            echo "## Release ${version}"
            echo ""
            echo "- Published: \`@bobmaertz/bitbucket-mcp@${version}\`"
            echo "- Tag: \`v${version}\`"
            echo "- Provenance: https://www.npmjs.com/package/@bobmaertz/bitbucket-mcp/v/${version}#provenance"
          } >> "$GITHUB_STEP_SUMMARY"
